<!-- @dsCard group="Brand" viewport="700x150" name="Capability Spine" subtitle="Monitor → Inspect → Tag → Track — the product narrative" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-primary); padding: 24px; font-family: var(--font-mono); }
  .flow { display: flex; align-items: center; gap: 10px; }
  .step { flex: 1; border: 1px solid var(--border-hairline); border-top: 3px solid var(--c); border-radius: var(--radius-md); padding: 14px 12px; }
  .n { font-size: 10px; color: var(--c); font-weight: 600; }
  .t { font-family: var(--font-title); font-size: 16px; color: var(--text-primary); margin: 4px 0 6px; font-weight: 700; }
  .d { font-family: var(--font-body); font-size: 10px; color: var(--text-tertiary); line-height: 1.4; }
  .arr { color: var(--text-tertiary); font-size: 18px; }
</style>
</head>
<body>
  <div class="flow">
    <div class="step" style="--c:var(--color-cobalt-500)"><div class="n">01</div><div class="t">Monitor</div><div class="d">Humans & agents on the desktop</div></div>
    <span class="arr">&#8594;</span>
    <div class="step" style="--c:var(--color-magenta-500)"><div class="n">02</div><div class="t">Inspect</div><div class="d">Inside the build black box</div></div>
    <span class="arr">&#8594;</span>
    <div class="step" style="--c:var(--color-neon-300)"><div class="n">03</div><div class="t">Tag</div><div class="d">Cryptographic flight recorder</div></div>
    <span class="arr">&#8594;</span>
    <div class="step" style="--c:var(--color-neon-400)"><div class="n">04</div><div class="t">Track</div><div class="d">AirTags beaconing from prod</div></div>
  </div>
</body>
</html>
