<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-primary); padding: 24px; font-family: var(--font-mono); }
  .row { display: flex; gap: 16px; }
  .tile { flex: 1; border: 1px solid var(--border-hairline); border-radius: var(--radius-md); padding: 28px 32px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; min-height: 132px; box-sizing: border-box; }
  .tile.lite { background: var(--color-white); }
  .tile img { width: auto; max-width: 100%; height: 44px; object-fit: contain; }
  .cap { font-size: 9px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.12em; }
  .tile.lite .cap { color: #6B6B6B; }
</style>
</head>
<body>
  <div class="row">
    <div class="tile"><img src="../assets/logos/logo-white.png" alt="Crash Override wordmark, white on black" /><span class="cap">white on black</span></div>
    <div class="tile lite"><img src="../assets/logos/logo-black.png" alt="Crash Override wordmark, black on white" /><span class="cap">black on white</span></div>
  </div>
</body>
</html>
