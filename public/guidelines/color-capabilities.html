<!-- @dsCard group="Colors" viewport="700x190" name="Capability Accents" subtitle="Monitor · Inspect · Tag · Track — the four-capability spine" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-primary); font-family: var(--font-mono); padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .cap { border: 1px solid var(--border-hairline); border-radius: var(--radius-md); padding: 14px; border-top: 3px solid var(--c); }
  .num { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--c); font-weight: 600; }
  .nm { font-family: var(--font-title); font-size: 18px; color: var(--text-primary); margin: 6px 0 10px; font-weight: 700; }
  .dot { width: 100%; height: 18px; border-radius: var(--radius-xs); background: var(--c); }
  .hex { font-size: 10px; color: var(--text-tertiary); margin-top: 6px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cap" style="--c:var(--color-cobalt-500)"><div class="num">01 · Monitor</div><div class="nm">Fandango</div><div class="dot"></div><div class="hex">#823AA4</div></div>
    <div class="cap" style="--c:var(--color-magenta-500)"><div class="num">02 · Inspect</div><div class="nm">Jazzberry</div><div class="dot"></div><div class="hex">#FF3F86</div></div>
    <div class="cap" style="--c:var(--color-neon-300)"><div class="num">03 · Tag</div><div class="nm">Lime ·lt</div><div class="dot"></div><div class="hex">#CFFF66</div></div>
    <div class="cap" style="--c:var(--color-neon-400)"><div class="num">04 · Track</div><div class="nm">Lime</div><div class="dot"></div><div class="hex">#B3FF00</div></div>
  </div>
</body>
</html>
