<!-- @dsCard group="Colors" viewport="700x150" name="Atomic Lime" subtitle="Primary accent — the signature Crash Override brand colour" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-primary); font-family: var(--font-mono); padding: 20px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; }
  .sw { flex: 1; height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; }
  .name { font-size: 11px; color: #050e02; font-weight: 600; }
  .hex { font-size: 10px; color: rgba(0,0,0,0.6); }
  .sw.dark .name { color: var(--text-primary); }
  .sw.dark .hex { color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--color-neon-100)"><span class="name">100</span><span class="hex">#F2FFCC</span></div>
    <div class="sw" style="background:var(--color-neon-300)"><span class="name">300</span><span class="hex">#CFFF66</span></div>
    <div class="sw" style="background:var(--color-neon-400)"><span class="name">400 · lime</span><span class="hex">#B3FF00</span></div>
    <div class="sw" style="background:var(--color-neon-500)"><span class="name">500</span><span class="hex">#9FE600</span></div>
    <div class="sw dark" style="background:var(--color-neon-800)"><span class="name">800</span><span class="hex">#5E8A00</span></div>
    <div class="sw dark" style="background:var(--color-neon-900)"><span class="name">900</span><span class="hex">#466700</span></div>
  </div>
</body>
</html>
