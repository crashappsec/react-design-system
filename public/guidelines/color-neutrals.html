<!-- @dsCard group="Colors" viewport="700x150" name="Neutral Scale" subtitle="Warm-grey ramp for text, borders & inactive states" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-primary); font-family: var(--font-mono); padding: 20px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-hairline); }
  .sw { flex: 1; height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 7px; }
  .name { font-size: 10px; font-weight: 600; }
  .hex { font-size: 9px; opacity: 0.7; }
  .light .name, .light .hex { color: #161616; }
  .dark .name, .dark .hex { color: var(--text-primary); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw light" style="background:var(--color-white)"><span class="name">white</span><span class="hex">F7F6F5</span></div>
    <div class="sw light" style="background:var(--color-grey-200)"><span class="name">200</span><span class="hex">D5D3CF</span></div>
    <div class="sw light" style="background:var(--color-grey-300)"><span class="name">300</span><span class="hex">9D9D9D</span></div>
    <div class="sw dark" style="background:var(--color-grey-500)"><span class="name">500</span><span class="hex">7B7B7B</span></div>
    <div class="sw dark" style="background:var(--color-grey-700)"><span class="name">700</span><span class="hex">4A4A4A</span></div>
    <div class="sw dark" style="background:var(--color-grey-850)"><span class="name">850</span><span class="hex">1A1F36</span></div>
    <div class="sw dark" style="background:var(--color-grey-900)"><span class="name">900</span><span class="hex">111827</span></div>
  </div>
</body>
</html>
