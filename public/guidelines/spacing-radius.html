<!-- @dsCard group="Spacing" viewport="700x170" name="Radius & Elevation" subtitle="Deliberately sharp corners · low restrained shadows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-primary); padding: 24px; font-family: var(--font-mono); }
  .row { display: flex; gap: 22px; align-items: flex-start; }
  .item { text-align: center; }
  .box { width: 72px; height: 72px; background: var(--color-dark-surface); border: 1px solid var(--border-default1); }
  .lbl { font-size: 10px; color: var(--text-primary); margin-top: 8px; font-weight: 600; }
  .sub { font-size: 9px; color: var(--text-tertiary); }
  .sh-sm { box-shadow: var(--shadow-sm); }
  .sh-md { box-shadow: var(--shadow-md); }
  .sh-lg { box-shadow: var(--shadow-lg); }
  .glow { box-shadow: var(--shadow-glow-neon); border-color: var(--color-neon-400); }
  .sep { width: 1px; align-self: stretch; background: var(--border-hairline); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="lbl">2px</div><div class="sub">xs</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lbl">4px</div><div class="sub">md · default</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lbl">6px</div><div class="sub">lg</div></div>
    <div class="sep"></div>
    <div class="item"><div class="box sh-md" style="border-radius:var(--radius-md)"></div><div class="lbl">shadow-md</div><div class="sub">elevation</div></div>
    <div class="item"><div class="box glow" style="border-radius:var(--radius-md)"></div><div class="lbl">glow-neon</div><div class="sub">focus / active</div></div>
  </div>
</body>
</html>
