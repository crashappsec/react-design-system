<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="8px grid — from 2px hairline gaps to 48px section rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-primary); padding: 24px; font-family: var(--font-mono); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--color-neon-400); width: 100%; border-radius: var(--radius-xs); }
  .lbl { font-size: 10px; color: var(--text-tertiary); }
  .px { font-size: 11px; color: var(--text-primary); font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="item" style="width:32px"><div class="bar" style="height:8px"></div><span class="px">8</span><span class="lbl">2</span></div>
    <div class="item" style="width:32px"><div class="bar" style="height:16px"></div><span class="px">16</span><span class="lbl">4</span></div>
    <div class="item" style="width:32px"><div class="bar" style="height:24px"></div><span class="px">24</span><span class="lbl">6</span></div>
    <div class="item" style="width:32px"><div class="bar" style="height:36px"></div><span class="px">36</span><span class="lbl">9</span></div>
    <div class="item" style="width:32px"><div class="bar" style="height:48px"></div><span class="px">48</span><span class="lbl">12</span></div>
    <div class="item" style="width:32px"><div class="bar" style="height:60px"></div><span class="px">60</span><span class="lbl">15</span></div>
    <div class="item" style="width:32px"><div class="bar" style="height:72px"></div><span class="px">72</span><span class="lbl">18</span></div>
    <div class="item" style="width:32px"><div class="bar" style="height:90px"></div><span class="px">90</span><span class="lbl">22</span></div>
  </div>
</body>
</html>
