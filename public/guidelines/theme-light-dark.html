<!-- @dsCard group="Colors" viewport="700x320" name="Light & Dark Themes" subtitle="Same tokens, two modes — accents hold, surfaces & text invert" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #000; padding: 18px; font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .pane { background: var(--surface-primary); border: 1px solid var(--border-hairline); border-radius: var(--radius-lg); padding: 18px; }
  .tag { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.16em; color: var(--text-tertiary); margin-bottom: 12px; }
  .card { background: var(--surface-card); border: 1px solid var(--border-hairline); border-top: 3px solid var(--color-neon-400); border-radius: var(--radius-md); padding: 14px; }
  h5 { font-family: var(--font-title); font-size: 15px; color: var(--text-primary); margin: 0 0 4px; letter-spacing: -0.01em; }
  .body { font-size: 12px; color: var(--text-secondary); margin: 0 0 12px; line-height: 1.45; }
  .row2 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .btn { font-family: var(--font-mono); font-size: 12px; font-weight: 600; white-space: nowrap; padding: 7px 14px; border-radius: var(--radius-md); background: var(--btn-primary-bg); color: var(--btn-primary-text); border: 1px solid var(--btn-primary-border); }
  .btn2 { font-family: var(--font-mono); font-size: 12px; font-weight: 600; white-space: nowrap; padding: 7px 14px; border-radius: var(--radius-md); background: var(--btn-secondary-bg); color: var(--btn-secondary-text); border: 1px solid var(--btn-secondary-border); }
  .pill { font-family: var(--font-mono); font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: var(--radius-full); color: var(--text-label-magenta); background: var(--color-magenta-400-12); }
  .link { color: var(--text-emphasis); font-size: 12px; font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="pane">
      <div class="tag">Dark · default</div>
      <div class="card">
        <h5>Track</h5>
        <p class="body">AirTags beacon back from production — where artifacts run and what changed.</p>
        <div class="row2"><span class="btn">Get Started</span><span class="btn2">Docs</span><span class="pill">Inspect</span><a class="link">Learn&nbsp;→</a></div>
      </div>
    </div>
    <div class="pane" data-theme="light">
      <div class="tag">Light · data-theme="light"</div>
      <div class="card">
        <h5>Track</h5>
        <p class="body">AirTags beacon back from production — where artifacts run and what changed.</p>
        <div class="row2"><span class="btn">Get Started</span><span class="btn2">Docs</span><span class="pill">Inspect</span><a class="link">Learn&nbsp;→</a></div>
      </div>
    </div>
  </div>
</body>
</html>
