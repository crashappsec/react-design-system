  .d2 { font-family: var(--font-title); font-weight: 700; letter-spacing: -0.02em; font-size: 26px; margin-top: 14px; }
  .acc { color: var(--color-neon-400); }

</head>
<body>
  <div class="meta">Display XL · clamp(48–72px)</div>
  <div class="d1"><span class="co-tagline"><span class="t-tag">Tag.</span> <span class="t-track">Track.</span> <span class="t-trust">Trust.</span></span></div>
